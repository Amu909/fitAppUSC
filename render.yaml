services:
  - type: web
    name: fitappusc-backend
    runtime: python
    plan: free
    rootDir: app/backend
    buildCommand: pip install -r requeriments.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
